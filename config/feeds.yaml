#
# category_hint: 给 AI 的分类提示（最终由 AI 决定）
# update_freq:   high = 每次都拉 / low = 间隔拉取
# fuzzy_window_hours: 模糊去重的时间窗口
# lang: zh / en

feeds:

  # ─── 🌍 国际新闻 ───────────────────────────────────────
  - name: "BBC News - Top Stories"
    url: "http://feeds.bbcnews.com/news/rss.xml"
    backup_url: "https://feeds.bbcnews.com/news/world/rss.xml"
    lang: "en"
    category_hint: "world"
    update_freq: "high"
    fuzzy_window_hours: 2

  - name: "Reuters - World News"
