# 💓 Keep Alive — 防止仓库因不活跃被 GitHub 禁用 Actions
#
# 根因修复：
# GitHub 会在仓库 60 天无 push 后自动禁用 scheduled workflows。
# 此任务每 25 天自动 push 一个空 commit，保持仓库活跃。

name: "💓 Keep Alive"

on:
  schedule:
    - cron: "0 12 1,15 * *"  # 每月 1 日和 15 日 UTC 12:00 (北京 20:00)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep alive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 更新时间戳文件
          echo "Last keep-alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/.keep_alive
          git add .github/.keep_alive

          # 只有有变更时才 commit（避免空 commit 报错）
          git diff --cached --quiet || {
            git commit -m "chore: keep alive [skip ci]"
            git push
            echo "✅ Keep-alive commit pushed."
          }

          echo "Done."
