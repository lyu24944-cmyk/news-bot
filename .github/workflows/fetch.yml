name: "📰 News Fetch Engine"

on:
  schedule:
    # UTC 0:00 / 6:00 / 12:00 = 北京时间 8:00 / 14:00 / 20:00
    - cron: "0 0,6,12 * * *"
  workflow_dispatch: # 支持手动触发

jobs:
  fetch:
    name: "Fetch & Process News"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
      UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
      DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run fetch engine
        run: python src/main_fetch.py
