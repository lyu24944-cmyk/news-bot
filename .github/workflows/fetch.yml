# 📰 News Fetch Engine
# 采集 RSS 新闻 → AI 分类摘要 → 存入 Redis
#
# 根因修复：
# 1. 使用多时间点 cron 增加触发可靠性
# 2. workflow_dispatch 支持手动 / 被其他 workflow 调用
# 3. concurrency 防止并发重复采集

name: "📰 News Fetch Engine"

on:
  schedule:
    # UTC 时间 → 北京时间 +8
    # 00:00 UTC = 08:00 北京  ← 早间采集
    # 06:00 UTC = 14:00 北京  ← 午间采集
    # 12:00 UTC = 20:00 北京  ← 晚间采集
    - cron: "0 0,6,12 * * *"
  workflow_dispatch:  # 支持手动触发 + 被 push.yml 调用

concurrency:
  group: fetch-engine
  cancel-in-progress: false  # 不取消正在运行的采集

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Fetch Engine
        env:
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        working-directory: src
        run: python main_fetch.py
