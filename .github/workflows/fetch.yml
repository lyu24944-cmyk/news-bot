# 📰 News Fetch Engine
# 采集 RSS 新闻 → AI 分类摘要 → 存入 Redis
#
# 每小时采集一次，确保实时推送有新鲜新闻

name: "📰 News Fetch Engine"

on:
  schedule:
    # 每小时整点运行，紧接着 push.yml 在 :05 运行
    - cron: "0 * * * *"
  workflow_dispatch:  # 支持手动触发 + 被 push.yml 调用

concurrency:
  group: fetch-engine
  cancel-in-progress: false  # 不取消正在运行的采集

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Fetch Engine
        env:
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        working-directory: src
        run: python main_fetch.py
